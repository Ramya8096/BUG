server:
  port: 8081

spring:
  application:
    name: user-service
    datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  flyway:
    enabled: false

jwt:
  secret: defaultSecretKeyWithAtLeast32CharactersForHS256
  expiration: 86400000 # 24h

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

